<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BBB Playback Enhancer</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-container">
        <!-- Header -->
        <div class="popup-header">
            <div class="popup-site">
                <svg class="popup-icon" viewBox="0 0 24 24" width="16" height="16">
                    <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                <span id="popup-domain">Yükleniyor...</span>
            </div>
        </div>

        <!-- Video Title -->
        <div class="popup-title" id="popup-title">
            Video başlığı yükleniyor...
        </div>

        <!-- Controls -->
        <div class="popup-controls">
            <button class="popup-btn popup-btn-seek" id="popup-backward" title="-10 saniye">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
                    <text x="12" y="15" text-anchor="middle" font-size="6" font-weight="700" fill="currentColor">10</text>
                </svg>
            </button>
            
            <button class="popup-btn popup-btn-play" id="popup-play" title="Oynat/Duraklat">
                <svg class="icon-play" viewBox="0 0 24 24" width="32" height="32">
                    <path fill="currentColor" d="M8 5v14l11-7z"/>
                </svg>
                <svg class="icon-pause" viewBox="0 0 24 24" width="32" height="32" style="display:none">
                    <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>
            
            <button class="popup-btn popup-btn-seek" id="popup-forward" title="+10 saniye">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path fill="currentColor" d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/>
                    <text x="12" y="15" text-anchor="middle" font-size="6" font-weight="700" fill="currentColor">10</text>
                </svg>
            </button>
        </div>

        <!-- Progress -->
        <div class="popup-progress-container">
            <div class="popup-progress-bar" id="popup-progress">
                <div class="popup-progress-played" id="popup-progress-played"></div>
                <div class="popup-marker popup-marker-start" id="popup-marker-start" style="display:none"></div>
                <div class="popup-marker popup-marker-end" id="popup-marker-end" style="display:none"></div>
            </div>
            <div class="popup-time">
                <span id="popup-current">0:00</span>
                <span class="popup-time-sep">/</span>
                <span id="popup-duration">0:00</span>
            </div>
        </div>

        <!-- Speed Control -->
        <div class="popup-speed">
            <span class="popup-speed-label">Hız:</span>
            <select id="popup-speed" class="popup-speed-select">
                <option value="0.25">0.25x</option>
                <option value="0.5">0.5x</option>
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="1.75">1.75x</option>
                <option value="2">2x</option>
                <option value="2.5">2.5x</option>
                <option value="3">3x</option>
                <option value="4">4x</option>
                <option value="5">5x</option>
                <option value="8">8x</option>
                <option value="16">16x</option>
            </select>
        </div>

        <!-- Marker Controls -->
        <div class="popup-markers">
            <button class="popup-marker-btn popup-marker-btn-start" id="popup-set-start" title="Mevcut zamanı ders başlangıcı olarak işaretle">
                <svg viewBox="0 0 24 24" width="14" height="14">
                    <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                <span>Ders Başı</span>
            </button>
            <button class="popup-marker-btn popup-marker-btn-end" id="popup-set-end" title="Mevcut zamanı ders bitişi olarak işaretle">
                <svg viewBox="0 0 24 24" width="14" height="14">
                    <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
                <span>Ders Sonu</span>
            </button>
        </div>

        <!-- No Video State -->
        <div class="popup-no-video" id="popup-no-video" style="display:none">
            <svg viewBox="0 0 24 24" width="48" height="48">
                <path fill="currentColor" d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12zM9.5 15l6.5-4.5-6.5-4.5z"/>
            </svg>
            <p>BBB video sayfası bulunamadı</p>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
