<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <!-- Pastel gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8DEF8"/>
      <stop offset="50%" style="stop-color:#F5D9E3"/>
      <stop offset="100%" style="stop-color:#B8F0E3"/>
    </linearGradient>
    <!-- Subtle shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Squircle background with pastel gradient -->
  <rect width="128" height="128" rx="32" fill="url(#bg)"/>
  <!-- Play button -->
  <g filter="url(#shadow)">
    <path d="M52 38v52l42-26z" fill="#1C1B1F" fill-opacity="0.85"/>
  </g>
</svg>
